<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2-1 관계도 그리기</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/konva@9/konva.min.js"></script>
    <script src="https://unpkg.com/react-konva@18/umd/react-konva.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; touch-action: none; -webkit-user-select: none; font-family: 'Pretendard', sans-serif; }
        .canvas-card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .modal-overlay { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useRef } = React;
        const { Stage, Layer, Circle, Text } = ReactKonva;

        const App = () => {
            const [nowNodes, setNowNodes] = useState([]);
            const [wishNodes, setWishNodes] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [studentNum, setStudentNum] = useState("");
            const [studentName, setStudentName] = useState("");
            const [answers, setAnswers] = useState({ q1: "", q2: "", q3: "", note: "" });
            
            const nowRef = useRef(null);
            const wishRef = useRef(null);

            const addNode = (e, set, list) => {
                if (e.target === e.target.getStage()) {
                    const pos = e.target.getStage().getPointerPosition();
                    set([...list, { id: Date.now(), x: pos.x, y: pos.y }]);
                }
            };

            const submit = async () => {
                if (!studentNum || !studentName) return alert("번호와 이름을 적어주세요!");
                
                const payload = {
                    info: "2-1",
                    studentId: `${studentNum}_${studentName}`,
                    nowImg: nowRef.current.toDataURL(),
                    wishImg: wishRef.current.toDataURL(),
                    answers: answers
                };

                try {
                    // ★ 중요: 배포 후 받은 실제 URL로 교체하세요.
                    const URL = "https://script.google.com/macros/s/AKfycbxjLPRPH1urMAh11WODu_Ge8zrSVujkxPilSR2tprTyQSsGvOnb3yyzmAg5haBCm2Pgcw/exec"; 
                    await fetch(URL, { method: 'POST', body: JSON.stringify(payload) });
                    alert("성공적으로 제출되었습니다!");
                    setIsModalOpen(false);
                } catch (e) {
                    alert("서버 연결에 실패했습니다. (CORS 또는 URL 확인 필요)");
                }
            };

            const CanvasSection = ({title, color, nodes, setNodes, stageRef}) => (
                <div className="flex flex-col flex-1 min-h-[300px]">
                    <h3 className={`font-bold mb-2 ml-2 ${color}`}>{title}</h3>
                    <div className="flex-1 canvas-card overflow-hidden bg-slate-50">
                        <Stage 
                            width={window.innerWidth > 768 ? (window.innerWidth/2 - 40) : (window.innerWidth - 40)} 
                            height={window.innerHeight - 350} 
                            onClick={(e) => addNode(e, setNodes, nodes)}
                            ref={stageRef}
                        >
                            <Layer>
                                <Circle x={(window.innerWidth > 768 ? window.innerWidth/4 : window.innerWidth/2) - 20} y={(window.innerHeight-350)/2} radius={8} fill="#94a3b8" />
                                {nodes.map(n => <Circle key={n.id} x={n.x} y={n.y} radius={20} fill={color.includes('indigo') ? '#6366f1' : '#10b981'} draggable />)}
                            </Layer>
                        </Stage>
                    </div>
                </div>
            );

            return (
                <div className="h-screen p-4 flex flex-col">
                    <div className="flex justify-between items-center mb-4">
                        <h1 className="text-xl font-bold">우리 반 관계도 <span className="text-indigo-600">(2-1)</span></h1>
                        <div className="flex gap-2">
                            <input placeholder="번호" className="w-16 p-2 border rounded-lg" onChange={e => setStudentNum(e.target.value)} />
                            <input placeholder="이름" className="w-24 p-2 border rounded-lg" onChange={e => setStudentName(e.target.value)} />
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col md:flex-row gap-4 mb-24">
                        <CanvasSection title="[현재] 우리 반 모습" color="text-indigo-600" nodes={nowNodes} setNodes={setNowNodes} stageRef={nowRef} />
                        <CanvasSection title="[미래] 바라는 모습" color="text-emerald-600" nodes={wishNodes} setNodes={setWishNodes} stageRef={wishRef} />
                    </div>

                    <button onClick={() => setIsModalOpen(true)} className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-12 py-4 rounded-full font-bold shadow-xl">작성 완료 및 답변하기</button>

                    {isModalOpen && (
                        <div className="modal-overlay fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-lg rounded-3xl p-8 shadow-2xl overflow-y-auto max-h-[85vh]">
                                <h2 className="text-xl font-bold mb-6">마음 나누기 질문지</h2>
                                <div className="space-y-4">
                                    {["모둠 활동을 함께하고 싶은 친구", "고민을 나눌 수 있는 친구", "조금 힘든 친구(비밀보장)"].map((q, i) => (
                                        <div key={i}>
                                            <label className="text-sm font-semibold text-slate-600">{i+1}. {q}</label>
                                            <input type="text" className="w-full border-b-2 py-2 outline-none focus:border-indigo-500" onChange={e => {
                                                const key = `q${i+1}`;
                                                setAnswers({...answers, [key]: e.target.value});
                                            }} />
                                        </div>
                                    ))}
                                    <div>
                                        <label className="text-sm font-semibold text-slate-600">4. 선생님께 하고 싶은 말</label>
                                        <textarea className="w-full border rounded-xl p-3 h-20 bg-slate-50 mt-2" onChange={e => setAnswers({...answers, note: e.target.value})}></textarea>
                                    </div>
                                </div>
                                <div className="flex gap-4 mt-8">
                                    <button onClick={() => setIsModalOpen(false)} className="flex-1 py-4 bg-slate-100 rounded-2xl font-bold">수정</button>
                                    <button onClick={submit} className="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold">최종 제출</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
